services:
  hy3d-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: hy3d-api
    ports:
      - "${HY3D_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      HY3D_SERVER_WORKSPACE_ROOT: /app/server_workspace
      HY3D_SERVER_EXPORTS_ROOT: /app/server_exports
      HY3D_MODEL_CACHE: /app/model_cache
    volumes:
      - hy3d_server_workspace:/app/server_workspace
      - hy3d_server_exports:/app/server_exports
      - hy3d_model_cache:/app/model_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  hy3d_server_workspace:
  hy3d_server_exports:
  hy3d_model_cache:

